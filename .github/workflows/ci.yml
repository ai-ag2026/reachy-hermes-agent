name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev,voice]"

      - name: Ruff check
        run: python -m ruff check --isolated src tests

      - name: Run tests
        run: python -m pytest -q

      - name: Compile sources
        run: python -m compileall -q src tests

      - name: Build wheel
        run: python -m pip wheel --no-deps -w dist .
