# Ruff config for the reachy-tars-app write-time drift gate.
# Runtime/dev floor is Python 3.12+ (see pyproject.toml).
target-version = "py312"
line-length = 120
extend-exclude = ["*.egg-info", "**/__pycache__", "build", "dist"]

[lint]
select = ["E4", "E7", "E9", "F", "B", "I"]

[lint.per-file-ignores]
"tests/**" = ["B", "F811", "E402"]

[format]
quote-style = "double"
